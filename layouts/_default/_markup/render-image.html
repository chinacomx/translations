{{- $url := urls.Parse .Destination -}}
{{- if $url.Scheme -}}
  <img src="{{ .Destination }}" alt="{{ .Text }}" {{ with .Title }}title="{{ . }}"{{ end }} />
{{- else -}}
  {{- $cleanPath := strings.TrimPrefix "/" .Destination -}}
  <img src="{{ $cleanPath | relURL }}" alt="{{ .Text }}" {{ with .Title }}title="{{ . }}"{{ end }} />
{{- end -}}
